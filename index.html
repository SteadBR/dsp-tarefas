<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadro Kanban - Sistema Preparado para DB</title>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #121212; color: #e0e0e0; margin: 0; padding: 30px; 
  }
  
  /* --- Modais --- */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(18, 18, 18, 0.95); z-index: 1000;
    display: flex; justify-content: center; align-items: center;
  }
  .modal-box {
    background-color: #1e1e24; padding: 30px; border-radius: 10px;
    border: 1px solid #333; text-align: center; width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .modal-box input, .modal-box select {
    width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px;
    border: 1px solid #5c5c77; background-color: #2b2b36; color: white;
  }
  .modal-box button {
    padding: 10px 20px; background-color: #4CAF50; color: white; border: none;
    border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px;
  }
  .modal-box button:hover { background-color: #45a049; }
  .btn-cancel { background-color: #ff5252 !important; margin-left: 10px; }
  .btn-cancel:hover { background-color: #ff0000 !important; }

  /* --- Estrutura do Quadro --- */
  .header-container {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
  }
  h2 { margin: 0; color: #ffffff; letter-spacing: 1px; }

  .board { display: flex; gap: 20px; justify-content: center; align-items: flex-start; }
  .column { 
    background-color: #1e1e24; border-radius: 8px; width: 320px; 
    padding: 15px; min-height: 500px; border: 1px solid #333;
  }
  .column h3 { text-align: center; margin-top: 0; margin-bottom: 20px; color: #9e9e9e; text-transform: uppercase; }
  
  /* --- Cartões --- */
  .card { 
    background-color: #2b2b36; padding: 15px 30px 15px 15px; border-radius: 6px; 
    margin-bottom: 12px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    border-left: 5px solid #5c5c77; position: relative; display: flex; flex-direction: column; gap: 10px;
  }
  .card:active { cursor: grabbing; transform: scale(0.98); }
  .task-text { font-size: 1rem; font-weight: 500; }
  
  /* --- Cores de Prioridade (Bordas) --- */
  .priority-vermelho { border-left-color: #ff5252; }
  .priority-laranja { border-left-color: #ff9800; }
  .priority-amarelo { border-left-color: #ffeb3b; }
  .priority-verde { border-left-color: #4caf50; }
  .priority-azul { border-left-color: #2196f3; }

  /* Etiquetas */
  .tag-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .info-tag { font-size: 0.75rem; color: #aaa; background-color: #1a1a20; padding: 4px 8px; border-radius: 4px; }
  
  /* Input para Atribuição Editável no Cartão */
  .assignee-input {
    font-size: 0.75rem; color: #aaa; background-color: #1a1a20; 
    padding: 4px 8px; border-radius: 4px; border: 1px dashed transparent; 
    outline: none; width: 110px; transition: all 0.2s; font-family: inherit;
  }
  .assignee-input:hover, .assignee-input:focus {
    border-color: #5c5c77; background-color: #22222a; color: #fff;
  }
  .assignee-input::placeholder { color: #666; }

  /* Select de Prioridade no Cartão */
  .priority-select {
    font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 4px;
    border: none; outline: none; cursor: pointer; text-transform: uppercase; appearance: none;
  }
  .bg-vermelho { background-color: #ff5252; color: white; }
  .bg-laranja { background-color: #ff9800; color: #121212; }
  .bg-amarelo { background-color: #ffeb3b; color: #121212; }
  .bg-verde { background-color: #4caf50; color: white; }
  .bg-azul { background-color: #2196f3; color: white; }

  .delete-btn {
    position: absolute; top: 8px; right: 10px; color: #ff5252;
    font-weight: bold; cursor: pointer; font-size: 1.2rem;
  }
  .add-btn { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

  <div class="overlay" id="task-modal" style="display: none;">
    <div class="modal-box">
      <h2>Nova Atividade</h2>
      <input type="text" id="new-task-text" placeholder="Descreva a tarefa...">
      <input type="text" id="new-task-assignee" placeholder="Atribuir a (Ex: Arte, João)...">
      <select id="new-task-priority">
        <option value="vermelho">Emergência</option>
        <option value="laranja">Muito Urgente</option>
        <option value="amarelo">Urgente</option>
        <option value="verde" selected>Pouco Urgente</option>
        <option value="azul">Não Urgente</option>
      </select>
      <div>
        <button onclick="handleCreateTask()">Salvar</button>
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="header-container">
    <h2>Painel Geral</h2>
    <div style="display: flex; gap: 15px; align-items: center;">
      <span id="user-display" style="color: #888; font-size: 0.9rem;"></span>
      <button class="add-btn" onclick="abrirModal()">+ Nova Tarefa</button>
    </div>
  </div>
  
  <div class="board">
    <div class="column" id="todo" ondrop="handleDrop(event)" ondragover="allowDrop(event)">
      <h3>A Fazer</h3>
    </div>
    <div class="column" id="doing" ondrop="handleDrop(event)" ondragover="allowDrop(event)">
      <h3>Em Andamento</h3>
    </div>
    <div class="column" id="done" ondrop="handleDrop(event)" ondragover="allowDrop(event)">
      <h3>Concluído</h3>
    </div>
  </div>

  <script>
    // Usuário logado simulado
    const loggedUser = "Admin Sistema"; 
    document.getElementById("user-display").innerText = "Logado como: " + loggedUser;

    // --- 1. SIMULAÇÃO DE BANCO DE DADOS (API MOCKS) ---
    const api = {
      createTask: async (taskData) => {
        console.log("Ação para DB: Criando tarefa...", taskData);
        return true; 
      },
      updateTaskStatus: async (taskId, newStatus) => {
        console.log(`Ação para DB: Movendo tarefa ${taskId} para a coluna ${newStatus}`);
        return true;
      },
      updateTaskPriority: async (taskId, newPriority) => {
        console.log(`Ação para DB: Atualizando prioridade da tarefa ${taskId} para ${newPriority}`);
        return true;
      },
      updateTaskAssignee: async (taskId, newAssignee) => { // <-- NOVA FUNÇÃO DE DB
        console.log(`Ação para DB: Atualizando responsável da tarefa ${taskId} para '${newAssignee}'`);
        return true;
      },
      deleteTask: async (taskId) => {
        console.log(`Ação para DB: Deletando tarefa ${taskId}`);
        return true;
      }
    };

    // --- 2. RENDERIZAÇÃO E LÓGICA DE INTERFACE ---
    function abrirModal() {
      document.getElementById("task-modal").style.display = "flex";
      document.getElementById("new-task-text").value = "";
      document.getElementById("new-task-assignee").value = "";
    }
    function fecharModal() { document.getElementById("task-modal").style.display = "none"; }

    function buildCardElement(taskData) {
      const card = document.createElement("div");
      card.className = `card priority-${taskData.priority}`;
      card.draggable = true;
      card.id = taskData.id;
      card.ondragstart = (ev) => ev.dataTransfer.setData("text", ev.target.id);

      card.innerHTML = `
        <span class="task-text">${taskData.text}</span>
        <div class="tag-container">
          <select class="priority-select bg-${taskData.priority}" onchange="changePriority(this, '${taskData.id}')" title="Alterar Urgência">
            <option value="vermelho" ${taskData.priority === 'vermelho' ? 'selected' : ''}>Emergência</option>
            <option value="laranja" ${taskData.priority === 'laranja' ? 'selected' : ''}>Muito Urgente</option>
            <option value="amarelo" ${taskData.priority === 'amarelo' ? 'selected' : ''}>Urgente</option>
            <option value="verde" ${taskData.priority === 'verde' ? 'selected' : ''}>Pouco Urgente</option>
            <option value="azul" ${taskData.priority === 'azul' ? 'selected' : ''}>Não Urgente</option>
          </select>
          
          <input type="text" class="assignee-input" value="${taskData.assignee || ''}" 
                 placeholder="👤 Atribuir..." 
                 onchange="changeAssignee(this, '${taskData.id}')" 
                 title="Clique para editar o responsável">
                 
          <span class="info-tag" title="Criador">✍️ ${taskData.creator}</span>
        </div>
        <span class="delete-btn" onclick="removeTask(this, '${taskData.id}')">&times;</span>
      `;
      return card;
    }

    async function handleCreateTask() {
      const text = document.getElementById("new-task-text").value;
      const assignee = document.getElementById("new-task-assignee").value;
      const priority = document.getElementById("new-task-priority").value;

      if (!text.trim()) return alert("Descreva a tarefa!");

      const newTask = {
        id: "task_" + Date.now(),
        text: text,
        assignee: assignee,
        priority: priority,
        creator: loggedUser,
        status: "todo"
      };

      await api.createTask(newTask);
      const cardEl = buildCardElement(newTask);
      document.getElementById("todo").appendChild(cardEl);
      fecharModal();
    }

    async function changePriority(selectElement, taskId) {
      const newPriority = selectElement.value;
      const card = document.getElementById(taskId);
      card.className = `card priority-${newPriority}`;
      selectElement.className = `priority-select bg-${newPriority}`;
      await api.updateTaskPriority(taskId, newPriority);
    }

    // --- NOVA FUNÇÃO: Mudar Atribuição ---
    async function changeAssignee(inputElement, taskId) {
      const newAssignee = inputElement.value.trim();
      // Envia atualização para o Banco (Simulado)
      await api.updateTaskAssignee(taskId, newAssignee);
    }

    function allowDrop(ev) { ev.preventDefault(); }
    
    async function handleDrop(ev) {
      ev.preventDefault();
      const taskId = ev.dataTransfer.getData("text");
      const card = document.getElementById(taskId);
      let targetColumn = ev.target;
      
      while (!targetColumn.classList.contains('column')) { 
        targetColumn = targetColumn.parentElement; 
      }
      
      targetColumn.appendChild(card);
      await api.updateTaskStatus(taskId, targetColumn.id);
    }

    async function removeTask(btnElement, taskId) {
      if(confirm("Deseja realmente excluir?")) {
        await api.deleteTask(taskId);
        btnElement.parentElement.remove();
      }
    }

    // Carga inicial
    window.onload = () => {
      const dbSimulado = [
        { id: "task_1", text: "Conter o avanço das Máculas no Bosque", assignee: "Senhores do Bosque", priority: "vermelho", creator: "Admin Sistema", status: "todo" },
        { id: "task_2", text: "Revisar os limites do Pacto de Sangue e Sombra", assignee: "Conselho de Luna", priority: "amarelo", creator: "Admin Sistema", status: "todo" },
        { id: "task_3", text: "Reunião de aliança com os Uivos da Lâmina", assignee: "Líderes", priority: "verde", creator: "Admin Sistema", status: "doing" }
      ];

      dbSimulado.forEach(task => {
        const card = buildCardElement(task);
        document.getElementById(task.status).appendChild(card);
      });
    };
  </script>
</body>
</html>
